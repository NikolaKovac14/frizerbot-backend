<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stran ni najdena — BookWell</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --black:#0a0a08; --gold:#c9984a; --paper:#faf7f2; --text-2:#5a5448; --border:rgba(0,0,0,0.08); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--paper); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 6vw; text-align:center; }
    .num { font-family:'Playfair Display',serif; font-size:clamp(80px,20vw,160px); font-weight:900; color:rgba(201,152,74,0.15); line-height:1; letter-spacing:-0.04em; }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,4vw,36px); font-weight:700; color:var(--black); margin-bottom:14px; }
    p { font-size:15px; color:var(--text-2); margin-bottom:36px; max-width:400px; line-height:1.7; }
    .links { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .btn-home { background:var(--black); color:var(--gold); padding:13px 36px; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; text-decoration:none; }
    .btn-home:hover { opacity:0.85; }
    .btn-back { color:var(--text-2); font-size:12px; padding:13px 20px; border:1px solid var(--border); text-decoration:none; }
    .btn-back:hover { border-color:var(--black); color:var(--black); }
    .logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:900; color:var(--black); margin-bottom:32px; }
    .logo span { color:var(--gold); }
  </style>
</head>
<body>
  <div class="logo">Book<span>Well</span></div>
  <div class="num">404</div>
  <h1>Stran ni najdena</h1>
  <p>Stran, ki jo iščete, ne obstaja ali je bila premaknjena.</p>
  <div class="links">
    <a href="/" class="btn-home">← Domača stran</a>
    <a href="#" onclick="history.back(); return false;" class="btn-back">Nazaj</a>
  </div>
</body>
</html>
